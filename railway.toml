[build]
builder = "NIXPACKS"
buildCommand = "python -m pip install --no-cache-dir -r backend/requirements.txt && python manage.py collectstatic --noinput"

[deploy]
startCommand = "python manage.py migrate && python manage.py create_initial_user && python manage.py runserver 0.0.0.0:$PORT"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
healthcheckPath = "/health/"
healthcheckTimeout = 100

[env]
PYTHONUNBUFFERED = "1"
PORT = "8000"
DJANGO_SETTINGS_MODULE = "jaytipargal.settings"
