[phases.setup]
nixPkgs = ["python311", "postgresql"]

[phases.install]
cmds = ["python -m pip install --no-cache-dir -r backend/requirements.txt"]

[phases.build]
cmds = ["python manage.py collectstatic --noinput"]

[start]
cmd = "python manage.py migrate && python manage.py create_initial_user && python manage.py runserver 0.0.0.0:$PORT"
